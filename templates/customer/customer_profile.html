
{% load static %}
{%load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Profile</title>

    <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>

    <style>
        body{
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url("{% static 'images/log_bg.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .emp-profile{
            padding: 3%;
            margin-top: 3%;
            margin-bottom: 3%;
            border-radius: 0.5rem;
            background: #fff;
        }

        .profile-img{
            text-align: center;
        }

        .profile-img img{
            width: 200px;
            height: 200px;
            object-fit: cover;
        }

        .profile-head h5{
            color: #333;
        }

        .profile-tab label{
            font-weight: 600;
        }

        .profile-tab p{
            font-weight: 600;
            color: #0062cc;
        }
    </style>
</head>

<body>

<div class="container emp-profile">

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row">

            <!-- Profile Image Section -->
            <div class="col-md-4">
                <div class="profile-img">

                    {% if data.profile_pic %}
                        <img src="{{ data.profile_pic.url }}" alt="Profile Image">
                    {% else %}
                        <img src="https://via.placeholder.com/200" alt="No Image">
                    {% endif %}



                </div>
            </div>

            <!-- Heading Section -->
            <div class="col-md-6">
                <div class="profile-head">
                    <h5>CUSTOMER</h5>
                </div>
            </div>

            <!-- Edit Button -->
            <div class="col-md-2 text-right">
                <a href="{% url 'customer_edit' %}" class="btn btn-secondary">
                    Edit
                </a>
            </div>

        </div>

        <hr>

        <!-- Profile Details -->
        <div class="row">
            <div class="col-md-6"><label>User Id</label></div>
            <div class="col-md-6"><p>{{ data.customer_detail }}</p></div>
        </div>

        <div class="row">
            <div class="col-md-6"><label>Name</label></div>
            <div class="col-md-6"><p>{{ data.name }}</p></div>
        </div>

        <div class="row">
            <div class="col-md-6"><label>Phone</label></div>
            <div class="col-md-6"><p>{{ data.phone }}</p></div>
        </div>

        <div class="row">
            <div class="col-md-6"><label>Address</label></div>
            <div class="col-md-6"><p>{{ data.address }}</p></div>
        </div>

        <div class="row">
            <div class="col-md-6"><label>Email</label></div>
            <div class="col-md-6"><p>{{ data.email }}</p></div>
        </div>

        <div class="row">
            <div class="col-md-6"><label>Joined On</label></div>
            <div class="col-md-6"><p>{{ data.joined_on }}</p></div>
        </div>

    </form>

</div>

</body>
</html>
